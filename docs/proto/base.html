<!DOCTYPE html>
<!--
  spek workspace 多 session 雛型 — 共用底稿 (base.html)
  三個雛型 (proto-1 / proto-2 / proto-3) 都複製這份 <head> 的 :root tokens、
  resets、視窗外框 (.window/.titlebar/.statusbar/.activity)、terminal 渲染 (.cc-term)
  與共用 primitives (.sdot/.badge/.card)。各雛型只改 .stage 內容 + 自己的 layout CSS。
-->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>spek — base</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: #07090c; --bg-1: #0a0c0f; --bg-2: #0f1216; --bg-3: #14181d;
    --bg-hover: #1b2027; --border: #1e242c; --border-soft: #171c22;
    --text: #e2e8f0; --text-dim: #94a3b8; --text-faint: #5b6675;
    --accent: #f59e0b; --accent-soft: rgba(245, 158, 11, 0.12);
    --blue: #60a5fa; --green: #34d399; --red: #f87171; --purple: #c084fc; --gray: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; background: #000;
    font-family: "Plus Jakarta Sans", sans-serif; color: var(--text);
    overflow: hidden; -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    background:
      radial-gradient(1400px 700px at 70% -10%, rgba(245,158,11,0.06), transparent 60%),
      radial-gradient(1000px 600px at 0% 110%, rgba(96,165,250,0.05), transparent 55%), #000;
  }
  .mono { font-family: "JetBrains Mono", monospace; }

  /* ===== window chrome ===== */
  .window {
    width: 100vw; height: 100vh; background: var(--bg-1);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .titlebar {
    height: 38px; flex: 0 0 38px;
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; padding: 0 14px; gap: 14px; user-select: none;
  }
  .traffic { display: flex; gap: 8px; }
  .traffic i { width: 12px; height: 12px; border-radius: 50%; display: block; }
  .traffic .r { background: #ff5f57; } .traffic .y { background: #febc2e; } .traffic .g { background: #28c840; }
  .title { flex: 1; text-align: center; font-size: 12px; color: var(--text-faint); letter-spacing: 0.04em; font-weight: 500; }
  .title b { color: var(--accent); font-weight: 700; }
  .title .proto { color: var(--blue); font-family: "JetBrains Mono", monospace; font-size: 11px; }

  .body { flex: 1; display: flex; min-height: 0; }

  /* activity bar */
  .activity {
    width: 50px; flex: 0 0 50px; background: var(--bg-0);
    border-right: 1px solid var(--border-soft);
    display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 4px;
  }
  .act-btn {
    width: 38px; height: 38px; border-radius: 9px; display: flex; align-items: center; justify-content: center;
    color: var(--text-faint); cursor: pointer; position: relative; transition: all .15s ease;
  }
  .act-btn svg { width: 21px; height: 21px; }
  .act-btn:hover { color: var(--text-dim); background: var(--bg-hover); }
  .act-btn.active { color: var(--accent); }
  .act-btn.active::before { content: ""; position: absolute; left: -10px; top: 8px; bottom: 8px; width: 2.5px; border-radius: 2px; background: var(--accent); }
  .act-spacer { flex: 1; }

  /* statusbar */
  .statusbar {
    height: 26px; flex: 0 0 26px; background: var(--bg-0); border-top: 1px solid var(--border-soft);
    display: flex; align-items: center; padding: 0 12px; font-size: 11.5px; color: var(--text-faint);
    gap: 16px; font-family: "JetBrains Mono", monospace;
  }
  .statusbar .git { color: var(--accent); } .statusbar .sp { flex: 1; }
  .statusbar .seg { display: flex; align-items: center; gap: 5px; }
  .statusbar .agent { color: var(--green); }

  /* ===== shared primitives ===== */
  /* session status dot */
  .sdot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 8px; background: var(--gray); }
  .sdot.run   { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.55); }
  .sdot.wait  { background: var(--accent); box-shadow: 0 0 7px rgba(245,158,11,0.7); animation: pulse 1.3s ease-in-out infinite; }
  .sdot.done  { background: var(--blue); }
  .sdot.err   { background: var(--red); box-shadow: 0 0 6px rgba(248,113,113,0.55); }
  .sdot.idle  { background: var(--text-faint); }
  @keyframes pulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }

  .badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 5px; letter-spacing: .04em; }
  .badge.active { background: rgba(52,211,153,0.14); color: var(--green); }
  .badge.arch { background: rgba(100,116,139,0.16); color: var(--gray); }
  .badge.spec { background: rgba(96,165,250,0.14); color: var(--blue); }
  .badge.wait { background: rgba(245,158,11,0.16); color: var(--accent); }
  .badge.err  { background: rgba(248,113,113,0.16); color: var(--red); }

  .diffstat { font-family: "JetBrains Mono", monospace; font-size: 11.5px; }
  .diffstat .a { color: var(--green); } .diffstat .d { color: var(--red); }

  .pbar { height: 6px; background: var(--bg-3); border-radius: 4px; overflow: hidden; }
  .pbar i { display: block; height: 100%; background: var(--accent); border-radius: 4px; }

  /* ===== terminal rendering (pty running `claude`) ===== */
  .cc-term {
    font-family: "JetBrains Mono", monospace; font-size: 12.5px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word; color: var(--text-dim); background: var(--bg-0);
    overflow-y: auto; padding: 12px 14px;
  }
  .cc-term .acc { color: var(--accent); } .cc-term .blue { color: var(--blue); font-weight: 600; }
  .cc-term .green { color: var(--green); } .cc-term .red { color: var(--red); }
  .cc-term .dim { color: var(--text-faint); } .cc-term .faint { color: #3f4854; }
  .cc-term .path { color: var(--accent); } .cc-term .str { color: var(--green); }
  .cc-term .add { color: var(--green); } .cc-term .rm { color: var(--red); }
  .cc-term .pulse { animation: pulse 1.4s ease-in-out infinite; }
  .cursor { display: inline-block; width: 8px; height: 15px; background: var(--accent); vertical-align: text-bottom; animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: #20262e; border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="traffic"><i class="r"></i><i class="y"></i><i class="g"></i></div>
    <div class="title"><b>spek</b> workspace — <span class="proto">base（不要直接看這份，看 proto-1/2/3）</span></div>
    <div style="width:54px"></div>
  </div>
  <div class="body">
    <div class="activity">
      <div class="act-btn active" title="Sessions"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg></div>
      <div class="act-btn" title="OpenSpec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-6"/></svg></div>
      <div class="act-btn" title="搜尋"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg></div>
      <div class="act-spacer"></div>
      <div class="act-btn" title="設定"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
    </div>

    <!-- 每個雛型在這裡放自己的 .stage -->
    <div class="stage" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-faint);">
      這是共用底稿，實際內容看 proto-1 / proto-2 / proto-3
    </div>
  </div>
  <div class="statusbar">
    <span class="seg git">◐ 3 sessions</span>
    <span class="seg">workspace</span>
    <span class="sp"></span>
    <span class="seg">UTF-8</span>
    <span class="seg" style="color:var(--accent)">spek ws 0.1</span>
  </div>
</div>
</body>
</html>
